bio: >-
  Years teaching dance: 10 years (2026) 


  WSDC All-Star West Coast Swing dancer, full-time Instructor | 2x 2nd place
  Bachata Stars Norwegian Champion |

  Trained in full-time dance school:

  Ballet, Jazz, Modern, Contemporary, Improvisation, Break dance, House, Hip
  Hop, Popping, Locking, Vouging, Waacking, Dance Hall  | Dabbled in
  Kizomba/afro, zouk and salsa | Pilates certified (comprehensive) |


  Well rounded and versatile training in partner and solo dance helps me explain
  movement and body mechanics tailored to the individual. Extensive knowledge of
  the body with a comprehensive certification in pilates and all its modalities.
  I specialize in body awareness and muscle integration. I have worked with some
  of the best movement, strength and flexibility coaches (Emmet Luis, Brett
  Contreras, Carlus Reed). I incorporate this knowledge of movement modalities
  into my teaching. Experienced in working with traumatized and anxious
  individuals making dance a place to heal and connect. Focus on  nervous system
  regulation. My students tell me our work together changed their lives in
  positive ways. I am happy to say you come home with more than just dance. You
  gain mindset shifts and feel seen, heard and attuned to. Everything is custom
  tailored to you, your learning style and your body mechanics.
