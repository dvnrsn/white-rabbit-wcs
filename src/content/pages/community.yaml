instructorsIntro: >-
  Arizona has a deep bench of talent, many of whom have taught at White Rabbit!
  We'll keep this listing as up to date as possible with all local WCS
  instructors - let us know if you'd like to be added!
venuesIntro: >-
  Local venues that feature West Coast Swing and related events, like Westie
