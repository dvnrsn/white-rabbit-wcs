gearIntro: New to WCS or just looking to upgrade? Here's what to know.
gearCards:
  - title: Shoes
    body: >-
      Suede-soled dance shoes are the standard. Look for low heels with a
      flexible sole. Popular brands include Very Fine, Ray Rose, and Freed of
      London. Budget pick: any suede-soled Latin shoe. Tom's slip-ons work very
      well too, as well as adding suede to a shoe of your choice.
  - title: Floor Prep
    body: >-
      Most Phoenix venues have hardwood or tile. Bring a sole brush to keep your
      suede clean. Avoid dancing on rubber-soled shoes — your knees will thank
      you.
  - title: Where to Shop
    body: >-
      Locally, Dee's Dancewear is great, and Nordstrom Rack and Ross will
      occasionally have excellent footwear options. Discount Dance Supply and
      Dance Naturals carry WCS-appropriate shoes online. Also check with
      instructors — some carry inventory or can point you to current deals. 
