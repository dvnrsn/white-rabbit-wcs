approachText: |2-
    Music and connection, the reasons we're all here. West Coast Swing thrives on
    the premise that great dancing follows great music, music you connect with,
    and an experience that amplifies that connection.

    Every White Rabbit event is curated specifically to highlight this idea. Our
    DJs don't just play songs, they engage music that moves them to move you. They
    build sets with intention, shaping the experience and the energy of the night
    to create the very best of what West Coast Swing social dancing can be.

    For many of us, that best was once only experienced at late-night socials
    during conventions. Our aim is to bring that experience home to you.
philosophyText: |2-
    We play music that moves people - literally. That means staying relevant
    without chasing trends, honoring the past and present while forging ahead to
    where music is going. Hundreds of genres and sub-genres of music present
    infinite opportunity to create just the right vibe, the optimal setting to
    maximize creativity, expression, and connection. We explore and employ the
    best of it - music we love that you love too.

    The music moves not only the dancers, but the dance itself. West Coast Swing
    is the most fascinating, exciting, entertaining, incredibly frustrating, and
    immeasurably fun form of partner dancing that we've seen, and it lives and
    dies, grows and thrives in direct relation to the music. We choose music that
    moves the dancers and the dance forward - to fun, growth, and thriving. 
manifestoLine: Music that moves you to become the dance.
manifestoSubline: Realize one truth - there is no spoon.
playlistsIntro: |2-
    Some of our favorite playlists! A mixture of sets from previous events, as
    well as curated lists by the White Rabbit Society and some of our favorite
    DJs. Enjoy!
