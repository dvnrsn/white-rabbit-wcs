name: NRG Ballroom
neighborhood: Tempe
floor: Hardwood
notes: >-
  Located in the space previously known as Paragon Dance Center, the studio has
  taken on a new look and energy under the NRG ownership to update, upscale and
  uplift the space to promote a comfortable, creative and fun environment for
  the Phoenix dance community. Our 9,000 square foot facility, hosting one of
  the largest floating floors in Arizona, provides plenty of space in which to
  find what moves you or stirs your dance passion. Awesome ballroom with two
  separate spaces and lots of dance to offer. Plenty of parking, located right
  next to a Sprouts grocery. 
website: https://nrgballroom.com/
