name: Imperial Ballroom
neighborhood: Scottsdale
floor: Hardwood
notes: >-
  A premier ballroom dance studio in Scottsdale, Arizona, proudly serving the
  greater Phoenix area. Known for a welcoming atmosphere and exceptional
  instruction, Imperial Ballroom is a place where beginners, social dancers,
  wedding couples, and competitive students feel at home from their very first
  step. One of the largest floating dance floors in Arizona.
