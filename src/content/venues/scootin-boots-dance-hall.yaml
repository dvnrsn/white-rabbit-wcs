name: Scootin' Boots Dance Hall
neighborhood: Mesa
floor: Laminate
notes: >-
  Scootin' Boots Dance Hall isn't just another place to two-step—it's a vibrant
  hub where country music and dance enthusiasts come alive. Since 2016, we've
  been the go-to spot in Mesa, AZ, for those looking to learn, practice, and
  show off their country dance moves. Our family-owned venue offers an inviting,
  alcohol-free environment that's perfect for dancers 18 and up (minors are
  welcome if accompanied by an adult). Plenty of parking!
website: https://www.scootinboots.com/
