name: Monkey Pants Bar & Grill
neighborhood: Tempe (South Mill)
floor: Polished Concrete
notes: >-
  A charming and eclectic dive bar par excellence, and Herringtone's favorite
  spot for karaoke westie bombs! The floor doesn't have a lot of space for
  dancing, but we make it work. Always a good time at The Pants.
