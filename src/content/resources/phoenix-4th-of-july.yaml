name: Phoenix 4th of July
type: Regional Event
description: >-
  At the Phoenix Fourth of July Dance Convention, you will experience an
  unforgettable weekend with Premier champions teaching inspiring workshops and
  intensives. Event attendees are welcomed with an exclusive cocktail party. In
  addition to WSDC competitions, you will also have the opportunity for Strictly
  Swing and Switchly competitions, nonstop social dancing, junior programs, and
  epic late-night parties. All of this takes place at the breathtaking,
  five-star J.W. Marriott Camelback Inn Resort and Spa in Scottsdale, Arizona.
url: https://phoenix4thofjuly.com/
