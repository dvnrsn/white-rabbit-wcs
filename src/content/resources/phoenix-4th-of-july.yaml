name: Phoenix 4th of July
type: Regional Event
description: >-
  As one of the original West Coast Swing conventions, we proudly honor the
  roots of West Coast Swing while contributing to shaping its future. Since
  1982, this iconic event is where “Legends are Made”. At the Phoenix Fourth of
  July Dance Convention, you will experience an unforgettable weekend with
  Premier champions teaching inspiring workshops and intensives. Event attendees
  are welcomed with an exclusive cocktail party. In addition to WSDC
  competitions, you will also have the opportunity for Strictly Swing and
  Switchly competitions, nonstop social dancing, junior programs, and epic
  late-night parties. Join the Breakfast Club and post your photo. All of this
  takes place at the breathtaking, five-star J.W. Marriott Camelback Inn Resort
  and Spa in Scottsdale, Arizona. “The Paradise Ballroom is the most beautiful
  ballroom on the circuit.
url: https://phoenix4thofjuly.com/
